name: "L2 Interop Harness"

# W7 L2 (Integration): two native peers establish a full WebRTC data channel (ICE → pure-Kotlin DTLS 1.3
# → SCTP → data channel) across REAL Linux NAT kernels, over each RFC 4787 NAT profile + a relay-only and
# an impaired lane. Separate from the fast deterministic PR lanes (review.yaml) — Docker + real kernels.
#
# W7 Phase 2 adds INTEROP lanes against real independent WebRTC engines — the differential oracles the
# harness exists to provide, split across two jobs so a slow browser build never gates the fast lanes:
#   * `l2` — the NAT-profile matrix + `pion-interop` (native offerer ⇄ a real Pion (Go) answerer over
#     DTLS 1.2 [Phase 2(a)]) + the fast JVM-offerer lanes (`jvm-native`, `jvm-pion`). HARNESS_SKIP drops
#     the browser scenarios here.
#   * `l2-browser` — a per-{arch × engine × offerer} matrix of parallel jobs [Phase 2(b) + JVM]: our
#     offerer (native peer OR JVM peer) ⇄ a real headless **Chrome** (Chromium libwebrtc), **Firefox**
#     (NSS/nICEr/usrsctp — a fully independent stack), and **WebKit** (Safari's engine — a third oracle),
#     each over DTLS 1.3 (our default). A browser has no raw UDP, so it signals over the rendezvous HTTP
#     face; WebKit emits `.local` mDNS host candidates (no disable pref), so it connects via srflx/relay.
# The JVM offerer runs the SAME pure-Kotlin engine on the JVM (socket-udp's NIO datapath), proving it on
# the real wire from a managed runtime; its jar is arch-independent (built once in build-peer, run on both
# arches). Every interop image builds natively inside its job (Pion: pure Go; browsers: Node + Playwright
# fetches the per-arch engine), no cross-compile, no QEMU. The browser image's engine download adds a few
# minutes to each browser job's first build.
#
# Arch-matched RUNTIME without QEMU, working around the K/N toolchain: Kotlin/Native cannot host its
# compiler on a linux/arm64 host (`Unknown host target: linux aarch64`), so the peer is CROSS-built for
# BOTH arches on an x64 host (`build-peer`), then each arch's runner only RUNS its own binary in native
# containers (`l2` matrix). No emulation on the data path.

on:
  pull_request:
    paths:
      - 'test-harness/**'
      - 'webrtc-harness-endpoint/**'
      - 'webrtc/**'
      - 'webrtc-ice/**'
      - 'webrtc-dtls/**'
      - 'webrtc-sctp/**'
      - 'webrtc-stun/**'
      - 'webrtc-sdp/**'
      - '.github/workflows/harness-l2.yaml'
  workflow_call:

jobs:
  build-peer:
    name: "cross-build peer (x64 → x64 + arm64)"
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # linuxArm64's BoringSSL is cross-compiled with the aarch64 GNU toolchain (webrtc-dtls'
      # buildBoringsslSslArm64); the runner doesn't ship it. linuxX64 uses the native gcc already present.
      - name: Install aarch64 cross-toolchain (linuxArm64 BoringSSL)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Cache Konan
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-harness-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-harness-${{ runner.os }}-

      # Cross-build the native peer for both arches, and assemble the arch-INDEPENDENT JVM fat jar once (the
      # jvm-* interop lanes run the SAME peer program on the JVM; one jar serves both arch runners).
      - name: Cross-build the release peer (native ×2 arch) + the JVM jar
        run: |
          ./gradlew --no-configuration-cache \
            :webrtc-harness-endpoint:linkPeerReleaseExecutableLinuxX64 \
            :webrtc-harness-endpoint:linkPeerReleaseExecutableLinuxArm64 \
            :webrtc-harness-endpoint:peerJar

      # Common ancestor `…/build/bin` is stripped by upload-artifact@v4, so the artifact holds
      # linuxX64/… and linuxArm64/… — the l2 job downloads it back under …/build/bin.
      - name: Upload peer binaries
        uses: actions/upload-artifact@v4
        with:
          name: peer-binaries
          path: |
            webrtc-harness-endpoint/build/bin/linuxX64/peerReleaseExecutable/peer.kexe
            webrtc-harness-endpoint/build/bin/linuxArm64/peerReleaseExecutable/peer.kexe
          if-no-files-found: error
          retention-days: 3

      # The JVM peer jar — a separate artifact (arch-independent; every jvm-* lane on either arch uses it).
      - name: Upload JVM peer jar
        uses: actions/upload-artifact@v4
        with:
          name: peer-jar
          path: webrtc-harness-endpoint/build/libs/webrtc-harness-peer-all.jar
          if-no-files-found: error
          retention-days: 3

  # The NAT-profile matrix + the Pion lane, per arch. Browser lanes are split into their own parallel
  # `l2-browser` job (below) so a slow Chromium/Firefox image build never gates the fast native lanes and
  # each engine gets isolated logs. HARNESS_SKIP drops the browser scenarios from run-interop.sh's matrix.
  l2:
    name: "establish over NAT profiles + Pion (${{ matrix.arch.name }}, ${{ matrix.ipfamily }})"
    needs: build-peer
    strategy:
      fail-fast: false
      # arch × ipfamily = 2 × 3 = 6 jobs. ipfamily is ORTHOGONAL to the NAT-profile SCENARIOS matrix inside
      # run-interop (a family-skip drops the family-degenerate lanes). v4 + dual + v6 are ALL GATING
      # (FAMILY_GATING in the interop step); v6 is red until its remaining routed-v6 fixes fully land.
      matrix:
        arch:
          - { runner: ubuntu-24.04, name: X64, konan: linuxX64 }
          - { runner: ubuntu-24.04-arm, name: Arm64, konan: linuxArm64 }
        ipfamily: [v4, v6, dual]
    runs-on: ${{ matrix.arch.runner }}
    # 11 scenarios now (7 NAT profiles + pion + jvm-native + jvm-pion + firewall-relay6), each a fresh stack —
    # a wider margin than the original 8-scenario budget, especially on the slower arm64 runner.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6

      # No gradle / Kotlin-Native on this job — it RUNS the cross-built binary (works on the arm64 host,
      # which cannot build one). Docker builds the coturn/rendezvous/nat images natively for its arch.
      - name: Download peer binaries
        uses: actions/download-artifact@v4
        with:
          name: peer-binaries
          path: webrtc-harness-endpoint/build/bin

      # The arch-independent JVM jar (for the jvm-native / jvm-pion lanes).
      - name: Download JVM peer jar
        uses: actions/download-artifact@v4
        with:
          name: peer-jar
          path: webrtc-harness-endpoint/build/libs

      - name: Restore exec bit
        run: chmod +x "webrtc-harness-endpoint/build/bin/${{ matrix.arch.konan }}/peerReleaseExecutable/peer.kexe"

      # Container-as-router between two Docker bridge networks only forwards with bridge netfilter OFF.
      - name: Enable container-router forwarding
        run: sudo sysctl -w net.bridge.bridge-nf-call-iptables=0 net.bridge.bridge-nf-call-ip6tables=0 || true

      # IPv6 on the runner's Docker daemon (v6/dual lanes only) — see the shared rationale below (l2-browser
      # has an identical step). Stock ubuntu-24.04 dockerd has IPv6 OFF; enable it + DETERMINISTICALLY validate
      # bring-up so a silently v6-disabled daemon fails fast + clearly instead of as a 40-min ICE timeout.
      - name: Enable + validate IPv6 on the Docker daemon
        if: ${{ matrix.ipfamily != 'v4' }}
        run: |
          set -euo pipefail
          echo '{"ipv6": true, "fixed-cidr-v6": "fd00:d0c::/48", "ip6tables": true}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sudo sysctl -w net.ipv6.conf.all.forwarding=1
          docker network create --ipv6 --subnet fd00:cafe::/64 v6probe
          if docker run --rm --network v6probe alpine:3.20 ip -6 addr | grep -q 'inet6 .*scope global'; then
            echo "[v6probe] OK — daemon assigns global IPv6 addresses"
          else
            echo "::error::[v6probe] Docker daemon did NOT bring IPv6 up (no global inet6 on a --ipv6 network)"; exit 1
          fi
          docker network rm v6probe

      # PEER_KEXE / PEER_JAR point at the downloaded artifacts → run-interop.sh uses them as-is (no build).
      # HARNESS_SKIP drops the browser lanes (native ⇄ browser AND jvm ⇄ browser run in l2-browser).
      # IP_FAMILY selects the compose overlays + family-skip. FAMILY_GATING=1 makes ALL families GATING —
      # v4 + dual + v6 are required lanes (v6 is red until its routed-v6 return-route + browser-bracketing
      # fixes fully land; that red is the honest signal, tracked via the SCENARIO summaries, not the masked
      # job status). impaired-loss-delay stays informational regardless (gated by $NON_GATING, not family).
      - name: L2 interop matrix (native + Pion + JVM offerer)
        env:
          PEER_KEXE: "webrtc-harness-endpoint/build/bin/${{ matrix.arch.konan }}/peerReleaseExecutable/peer.kexe"
          PEER_JAR: "webrtc-harness-endpoint/build/libs/webrtc-harness-peer-all.jar"
          HARNESS_SKIP: "chrome-interop firefox-interop webkit-interop jvm-chrome jvm-firefox jvm-webkit"
          IP_FAMILY: "${{ matrix.ipfamily }}"
          FAMILY_GATING: "1"
        run: |
          set -o pipefail
          bash test-harness/run-interop.sh 2>&1 | tee l2-harness.log

      # On failure, upload the tee'd log AND the capture-on-failure forensic bundle (design §B) — pcaps,
      # per-container logs, conntrack/firewall state, the rendezvous mailbox, seeds + selected pair — so a
      # red lane is deterministically root-causable from the artifact (no local repro). Ring-bounded pcaps +
      # failure-only copy keep it small; the whole test-harness/diag/ tree is one bundle per failed scenario.
      - name: Upload harness log + diagnostics (on any scenario failure)
        # NOT just `failure()`: a v6/dual lane is NON-GATING (the job exits 0 even when its scenarios
        # fail), so `failure()` is false and the forensic bundle — the whole point of capture-on-failure —
        # would never upload for exactly the informational-first lanes we need to root-cause. `collect_diagnostics`
        # writes test-harness/diag/** ONLY on a scenario failure (gating OR non-gating), so its presence is the
        # true "something failed" signal; a fully-green run leaves no diag dir and uploads nothing.
        if: ${{ failure() || hashFiles('test-harness/diag/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: l2-harness-diag-${{ matrix.arch.name }}-${{ matrix.ipfamily }}
          path: |
            l2-harness.log
            test-harness/diag/**
          retention-days: 14
          if-no-files-found: ignore

  # Browser interop as a per-{arch × engine} matrix of PARALLEL jobs — Chrome (Chromium libwebrtc) and
  # Firefox (NSS/nICEr/usrsctp, a fully independent oracle), each over DTLS 1.3 (our default). Each job
  # runs ONLY its `<browser>-interop` scenario (run-interop.sh single-scenario allowlist). The browser
  # image is built natively for the job's arch (no cross-compile, no QEMU) BUT with a persistent buildx +
  # gha layer cache: the expensive `npm install` + `playwright install` (engine download) layers are
  # restored from cache on unchanged inputs, so after the first run each job is a near-instant cache hit
  # instead of a fresh multi-minute download. The image is loaded under compose's default name so
  # run-interop.sh (HARNESS_NO_BROWSER_BUILD=1) reuses it without rebuilding.
  l2-browser:
    name: "interop: ${{ matrix.browser }} ⇄ ${{ matrix.peer }} (${{ matrix.arch.name }}, ${{ matrix.ipfamily }})"
    needs: build-peer
    strategy:
      fail-fast: false
      # arch(2) × browser(3) × peer(2) × ipfamily(3) = 36 jobs. ipfamily is orthogonal; v4 + dual + v6 are
      # ALL GATING (FAMILY_GATING in the interop step); v6 is red until its routed-v6 fixes land. The browser image is
      # family-INDEPENDENT, so ipfamily is deliberately kept OUT of the buildx cache scope (below) — all three
      # families share one cache per {engine × arch}.
      matrix:
        arch:
          - { runner: ubuntu-24.04, name: X64, konan: linuxX64 }
          - { runner: ubuntu-24.04-arm, name: Arm64, konan: linuxArm64 }
        browser: [chrome, firefox, webkit]
        # The offerer against each browser: our native peer AND our JVM peer (the pure engine from a
        # managed runtime). Same gha-cached browser image serves both — only the offerer differs.
        peer: [native, jvm]
        ipfamily: [v4, v6, dual]
    runs-on: ${{ matrix.arch.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Download peer binaries
        uses: actions/download-artifact@v4
        with:
          name: peer-binaries
          path: webrtc-harness-endpoint/build/bin

      # The arch-independent JVM jar (the jvm-<browser> lanes; harmless for the native lanes).
      - name: Download JVM peer jar
        uses: actions/download-artifact@v4
        with:
          name: peer-jar
          path: webrtc-harness-endpoint/build/libs

      - name: Restore exec bit
        run: chmod +x "webrtc-harness-endpoint/build/bin/${{ matrix.arch.konan }}/peerReleaseExecutable/peer.kexe"

      - name: Enable container-router forwarding
        run: sudo sysctl -w net.bridge.bridge-nf-call-iptables=0 net.bridge.bridge-nf-call-ip6tables=0 || true

      # IPv6 on the runner's Docker daemon (v6/dual lanes only) — enable + deterministically validate. It runs
      # BEFORE buildx setup + the browser image build, so the daemon restart precedes (and cannot wipe) the
      # loaded image. ip6tables installs the v6 chains for user networks; fixed-cidr-v6 governs only the
      # default bridge (disjoint from the compose v6 subnets). v6probe fails fast if IPv6 didn't come up.
      - name: Enable + validate IPv6 on the Docker daemon
        if: ${{ matrix.ipfamily != 'v4' }}
        run: |
          set -euo pipefail
          echo '{"ipv6": true, "fixed-cidr-v6": "fd00:d0c::/48", "ip6tables": true}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sudo sysctl -w net.ipv6.conf.all.forwarding=1
          docker network create --ipv6 --subnet fd00:cafe::/64 v6probe
          if docker run --rm --network v6probe alpine:3.20 ip -6 addr | grep -q 'inet6 .*scope global'; then
            echo "[v6probe] OK — daemon assigns global IPv6 addresses"
          else
            echo "::error::[v6probe] Docker daemon did NOT bring IPv6 up (no global inet6 on a --ipv6 network)"; exit 1
          fi
          docker network rm v6probe

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Pre-build the browser image WITH a gha layer cache and load it into the daemon under compose's
      # default image name (webrtc-l2-harness-<service>), so the interop step reuses it (no rebuild). The
      # cache scope is per {engine × arch} so the arm64 and x64 caches never clobber each other.
      #
      # This build is bounded + retried because the `type=gha` cache backend intermittently STALLS on
      # export under concurrent matrix load — a stall consumed the whole 30-min job budget and the job was
      # cancelled BEFORE the interop step ever ran (see #29: `cancelled`, not a real interop failure). A
      # per-step timeout turns that stall into a fast, retryable failure instead of a silent 30-min cancel.
      - name: Build browser image (gha-cached)
        id: browser_build
        uses: docker/build-push-action@v6
        timeout-minutes: 12
        continue-on-error: true
        with:
          context: test-harness/browser
          # Playwright engine name: chrome→chromium; firefox/webkit are already the engine name.
          build-args: |
            BROWSER=${{ matrix.browser == 'chrome' && 'chromium' || matrix.browser }}
          tags: webrtc-l2-harness-${{ matrix.browser }}:latest
          load: true
          cache-from: type=gha,scope=browser-${{ matrix.browser }}-${{ matrix.arch.name }}
          cache-to: type=gha,mode=max,scope=browser-${{ matrix.browser }}-${{ matrix.arch.name }}

      # Retry once if the first attempt stalled/failed. The retry drops cache-TO (the mode=max export is the
      # heavy, stall-prone half) and keeps cache-FROM, so it fails fast or wins. No continue-on-error here:
      # a second failure is a genuine build error and SHOULD fail the job (fast, not at the 30-min timeout).
      - name: Build browser image (retry — no cache export)
        if: steps.browser_build.outcome == 'failure'
        uses: docker/build-push-action@v6
        timeout-minutes: 12
        with:
          context: test-harness/browser
          build-args: |
            BROWSER=${{ matrix.browser == 'chrome' && 'chromium' || matrix.browser }}
          tags: webrtc-l2-harness-${{ matrix.browser }}:latest
          load: true
          cache-from: type=gha,scope=browser-${{ matrix.browser }}-${{ matrix.arch.name }}

      # Scenario name selects the offerer: `<browser>-interop` (native) or `jvm-<browser>` (JVM peer).
      - name: "Interop: our ${{ matrix.peer }} peer ⇄ ${{ matrix.browser }}"
        env:
          PEER_KEXE: "webrtc-harness-endpoint/build/bin/${{ matrix.arch.konan }}/peerReleaseExecutable/peer.kexe"
          PEER_JAR: "webrtc-harness-endpoint/build/libs/webrtc-harness-peer-all.jar"
          HARNESS_NO_BROWSER_BUILD: "1"  # reuse the gha-cached image built above
          SCENARIO: "${{ matrix.peer == 'jvm' && format('jvm-{0}', matrix.browser) || format('{0}-interop', matrix.browser) }}"
          IP_FAMILY: "${{ matrix.ipfamily }}"
          FAMILY_GATING: "1"  # all families gating (v4+dual+v6); see the l2 job's note
        run: |
          set -o pipefail
          bash test-harness/run-interop.sh "$SCENARIO" 2>&1 | tee l2-browser.log

      # On failure, upload the tee'd log AND the capture-on-failure forensic bundle (design §B) — see the l2
      # job's upload step. The browser lane's bundle carries the same pcaps/state/mailbox for the one scenario.
      - name: Upload harness log + diagnostics (on any scenario failure)
        # See the l2 job's upload step: non-gating v6/dual lanes exit 0, so gate on the presence of the
        # diag bundle (written only on a scenario failure), not just `failure()`, or the bundle never uploads.
        if: ${{ failure() || hashFiles('test-harness/diag/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: l2-browser-diag-${{ matrix.browser }}-${{ matrix.peer }}-${{ matrix.arch.name }}-${{ matrix.ipfamily }}
          path: |
            l2-browser.log
            test-harness/diag/**
          retention-days: 14
          if-no-files-found: ignore
