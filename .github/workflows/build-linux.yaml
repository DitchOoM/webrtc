name: "Build & Test (Linux)"

# Reusable lane: JVM / JS / WASM / Android / Linux-K/N build + test, then publish every module to a
# local Maven repo uploaded as the `maven-local-linux` artifact. Outputs the computed version so the
# caller can thread it into validate / publish.
#
# W4: webrtc-dtls provisions BoringSSL `libssl.a` for BOTH linux targets during `build`. linuxX64 uses
# the runner's native gcc (preinstalled); linuxArm64 is cross-compiled and needs the aarch64 GNU
# toolchain — installed below. cmake/make are preinstalled on ubuntu-24.04.

on:
  workflow_call:
    inputs:
      gradle-args:
        description: "Extra Gradle arguments (e.g., -PincrementMinor=true)"
        required: false
        default: ""
        type: string
    outputs:
      version:
        description: "Computed next version"
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    name: "Linux / JVM / JS / WASM / Android"
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      # Dependency + Gradle build cache (smarter than setup-java's cache:gradle; matches socket).
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # linuxArm64 BoringSSL (webrtc-dtls :buildBoringsslSslArm64) is cross-compiled with the aarch64 GNU
      # toolchain; the runner doesn't ship it. Without this, cmake fails "CMAKE_C_COMPILER
      # aarch64-linux-gnu-gcc ... not found in the PATH". linuxX64 uses the native gcc already present.
      - name: Install aarch64 cross-toolchain (linuxArm64 BoringSSL)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      # Kotlin/Native toolchain + prebuilts (linuxX64/linuxArm64 compiles, qemu-aarch64). Mirrors the
      # Apple lane; keyed on the version catalog so a Kotlin bump busts it.
      - name: Cache Konan
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Setup Chrome (jsBrowserTest / wasmJsBrowserTest)
        uses: browser-actions/setup-chrome@v2

      - name: Compute version
        id: version
        run: |
          version=$(./gradlew -q :webrtc:properties ${{ inputs.gradle-args }} --no-configuration-cache \
            | awk -F': ' '/^version:/{print $2}')
          if [ -z "$version" ]; then echo "::error::could not compute version"; exit 1; fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${version}"

      - name: Build + test (Linux/JVM/JS/WASM/Android)
        # pipefail so the step fails on Gradle's exit code, not tee's; --stacktrace + the tee'd log make
        # a compiler ICE / cmake-config failure (which produce NO test-results artifact) diagnosable from
        # a downloadable file instead of the scrollback. Uploaded below on failure.
        run: |
          set -o pipefail
          ./gradlew build allTests ${{ inputs.gradle-args }} --no-configuration-cache --stacktrace 2>&1 \
            | tee build-linux.log

      # On ANY failure, capture the actual reason instead of leaving only the console tail: the JUnit
      # XML carries each failing test's full stack + captured stdout/stderr (and, for our seeded
      # deterministic tests, the failing seed is in the assertion message — so a flake is reproducible,
      # not guessed at); the HTML mirrors it for humans. Per-target reports land under
      # <module>/build/{test-results,reports/tests}/<target>Test/. Placed last so it fires whichever
      # earlier step failed. (A Develocity Build Scan with per-test timing is also published each run.)
      - name: Upload test reports (on failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-linux
          path: |
            **/build/test-results/**
            **/build/reports/tests/**
          retention-days: 14
          if-no-files-found: ignore

      # The build log carries what the JUnit XML cannot: Kotlin compiler internal errors (e.g. a wasmJs
      # WasmIrToBinary ICE) and native cmake/toolchain-config failures leave no test-results artifact, so
      # without this a non-test failure means reading the raw Actions log. --stacktrace is captured above.
      - name: Upload full build log (on failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: build-log-linux
          path: build-linux.log
          retention-days: 14
          if-no-files-found: warn

      - name: Binary-compatibility check (public ABI)
        run: ./gradlew apiCheck ${{ inputs.gradle-args }} --no-configuration-cache

      - name: Publish to local Maven repo
        # -PskipPrePublishCheck: tests already ran in "Build + test" above; don't re-run the gate.
        run: ./gradlew publishToMavenLocal -PskipPrePublishCheck=true ${{ inputs.gradle-args }} --no-configuration-cache

      - name: Stage published artifacts
        run: |
          mkdir -p /tmp/maven-local-linux/com/ditchoom
          cp -r ~/.m2/repository/com/ditchoom/. /tmp/maven-local-linux/com/ditchoom/

      - name: Upload maven-local (linux)
        uses: actions/upload-artifact@v7
        with:
          name: maven-local-linux
          path: /tmp/maven-local-linux
          retention-days: 3
