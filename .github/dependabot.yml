# Dependabot keeps GitHub Actions and the independently-versioned Gradle libraries current. The
# tightly-coupled toolchain (Kotlin, KSP, kotlin-wrappers, AGP) is deliberately left out — those must
# move in lockstep and need a real build to validate, so they are handled by hand / a periodic agent.
version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    ignore:
      # Coordinated, build-validated toolchain bumps are owned separately (a lone Kotlin bump breaks
      # KSP; AGP majors need a build to verify).
      - dependency-name: "org.jetbrains.kotlin:*"
      - dependency-name: "org.jetbrains.kotlin.*"
      - dependency-name: "com.google.devtools.ksp*"
      - dependency-name: "org.jetbrains.kotlin-wrappers:*"
      - dependency-name: "com.android.*"
    groups:
      gradle-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
