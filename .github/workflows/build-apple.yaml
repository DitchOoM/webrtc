name: "Build & Test (Apple)"

# Reusable lane: the Apple K/N target matrix (macOS/iOS/watchOS/tvOS), built and — for the simulator
# and host targets — tested on the macOS runner. Publishes the Apple klibs to a local Maven repo
# uploaded as `maven-local-apple`, which validate merges with the Linux half.
#
# Per the V6_MAC_VALIDATION convention: Apple lanes are compile-faithful on the Linux dev box and
# runtime-validated here on the macOS runner. The PR description states which lanes ran where.

on:
  workflow_call:
    inputs:
      gradle-args:
        description: "Extra Gradle arguments"
        required: false
        default: ""
        type: string
    outputs:
      version:
        description: "Computed next version"
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    name: "macOS / Apple K/N"
    runs-on: macos-latest
    timeout-minutes: 60
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      # Dependency + Gradle build cache (smarter than setup-java's cache:gradle; matches socket).
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache Konan
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Compute version
        id: version
        run: |
          version=$(./gradlew -q :webrtc:properties ${{ inputs.gradle-args }} --no-configuration-cache \
            | awk -F': ' '/^version:/{print $2}')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build + test (host macOS + iOS simulator)
        run: ./gradlew macosArm64Test iosSimulatorArm64Test ${{ inputs.gradle-args }} --no-configuration-cache

      # On failure, capture the Apple K/N test reports (JUnit XML with full stack + captured output;
      # for seeded tests the failing seed is in the assertion message) — so an Apple-only flake that
      # can't be reproduced on the Linux dev box is diagnosable from the exact failure, not guessed.
      - name: Upload test reports (on failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-apple
          path: |
            **/build/test-results/**
            **/build/reports/tests/**
          retention-days: 14
          if-no-files-found: ignore

      - name: Publish Apple klibs to local Maven repo
        # -PskipPrePublishCheck: the macOS lane has no Chrome/JS-browser toolchain for the full gate;
        # its Apple tests ran above, the cross-platform tests run on the Linux lane.
        run: ./gradlew publishToMavenLocal -PskipPrePublishCheck=true ${{ inputs.gradle-args }} --no-configuration-cache

      - name: Stage published artifacts
        run: |
          mkdir -p /tmp/maven-local-apple/com/ditchoom
          cp -r ~/.m2/repository/com/ditchoom/. /tmp/maven-local-apple/com/ditchoom/

      - name: Upload maven-local (apple)
        uses: actions/upload-artifact@v4
        with:
          name: maven-local-apple
          path: /tmp/maven-local-apple
          retention-days: 3
