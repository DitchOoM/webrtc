name: "Build and Test"
on:
  pull_request:
    paths-ignore:
      - '*.md'
    types:
      - synchronize
      - opened

concurrency:
  group: review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standing-directives:
    uses: ./.github/workflows/standing-directives.yaml

  build-linux:
    uses: ./.github/workflows/build-linux.yaml

  build-apple:
    uses: ./.github/workflows/build-apple.yaml

  # T0′ (RFC §7): time-boxed coverage-guided Jazzer fuzzing of the pure-Kotlin STUN decoder, warm-
  # started from the committed seed corpus. A crash-free run is the gate; findings are demoted to
  # committed regression fixtures + corpus seeds (the two Jazzer finds in W1 already were).
  fuzz:
    name: "Fuzz (STUN codec, Jazzer)"
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Fuzz the STUN decoder (time-boxed)
        run: ./gradlew :webrtc-stun:stunCodecFuzz -PstunFuzzSeconds=120 --no-configuration-cache
      # A Jazzer find writes the EXACT crashing input to build/fuzz/**/{crash,timeout,oom,slow-unit}-*.
      # Upload it so a fuzz failure is reproduced from the real bytes (feed the file back to the target),
      # not re-discovered — the input then becomes a committed regression fixture (directive #5).
      - name: Upload Jazzer crash repros (on failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-repros-stun
          path: '**/build/fuzz/**'
          retention-days: 30
          if-no-files-found: ignore

  # T0′ (RFC §7): time-boxed coverage-guided Jazzer fuzzing of the pure-Kotlin SDP parser, warm-started
  # from the committed seed corpus. A crash-free run is the gate; findings are demoted to committed
  # regression fixtures + corpus seeds.
  fuzz-sdp:
    name: "Fuzz (SDP codec, Jazzer)"
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Fuzz the SDP parser (time-boxed)
        run: ./gradlew :webrtc-sdp:sdpCodecFuzz -PsdpFuzzSeconds=120 --no-configuration-cache
      - name: Upload Jazzer crash repros (on failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-repros-sdp
          path: '**/build/fuzz/**'
          retention-days: 30
          if-no-files-found: ignore

  # T0′ (RFC §7): time-boxed coverage-guided Jazzer fuzzing of the pure-Kotlin SCTP + DCEP decoders,
  # warm-started from the committed seed corpus. A crash-free run is the gate; findings are demoted to
  # committed regression fixtures + corpus seeds (the W5 valueSize-vs-truncated-TLV find already was).
  fuzz-sctp:
    name: "Fuzz (SCTP codec, Jazzer)"
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Fuzz the SCTP + DCEP decoders (time-boxed)
        run: ./gradlew :webrtc-sctp:sctpCodecFuzz -PsctpFuzzSeconds=120 --no-configuration-cache
      - name: Upload Jazzer crash repros (on failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-repros-sctp
          path: '**/build/fuzz/**'
          retention-days: 30
          if-no-files-found: ignore

  validate:
    needs: [build-linux, build-apple]
    uses: ./.github/workflows/validate-artifacts.yaml
    with:
      version: ${{ needs.build-linux.outputs.version }}
