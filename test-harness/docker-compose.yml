name: webrtc-l2-harness

# L2 interop harness — two native peers behind their own NAT gateways establish a full WebRTC data
# channel (ICE → real BoringSSL DTLS → SCTP) across real Linux kernels, gathering srflx/relay candidates
# from real coturn and signaling over the UDP rendezvous. run-interop.sh drives this, swapping the NAT
# profile (${NAT_A_PROFILE}/${NAT_B_PROFILE}) and policy (${ICE_POLICY}) per scenario. All ${VARS} are
# substituted from harness.env (run-interop.sh exports it); services also get it at runtime via env_file.
#
#   peer_a ─lan_a─ nat_a ═══pub═══ coturn / rendezvous ═══pub═══ nat_b ─lan_b─ peer_b
#
# The cgnat / hairpin lanes insert an EXTRA carrier-grade NAT between each CPE (nat_a/nat_b) and pub —
# a NAT444 double translation (see the cgnat_* services + the `car` network):
#   peer_a ─lan_a─ nat_a ─car─ cgnat_a ══pub══ coturn ══pub══ cgnat_b ─car─ nat_b ─lan_b─ peer_b   (cgnat)
#   peer_a ─lan_a─ nat_a ─┐                                                ┌─ nat_b ─lan_b─ peer_b   (hairpin)
#                         └───car── cgnat (shared) ══pub══ coturn ══pub═══┘   both CPEs, one carrier NAT

networks:
  pub:
    ipam: { config: [{ subnet: "${PUB_SUBNET}" }] }
  lan_a:
    ipam: { config: [{ subnet: "${LAN_A_SUBNET}" }] }
  lan_b:
    ipam: { config: [{ subnet: "${LAN_B_SUBNET}" }] }
  # Carrier-grade shared space between the CPE NATs and the public net — the extra hop for the double-NAT
  # (NAT444) / hairpin lanes. Always defined; only the cgnat_* carrier NATs (profile-gated) join it beyond
  # the CPEs, so it sits idle in the single-NAT lanes.
  car:
    ipam: { config: [{ subnet: "${CAR_SUBNET}" }] }

services:
  coturn:
    image: coturn/coturn:4.6
    env_file: ./harness.env
    entrypoint: ["/bin/sh", "/etc/coturn/entrypoint.sh"]
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ./coturn/entrypoint.sh:/etc/coturn/entrypoint.sh:ro
    networks:
      pub: { ipv4_address: "${COTURN_IP}" }
    healthcheck:
      test: ["CMD-SHELL", "pidof turnserver >/dev/null 2>&1 || pgrep turnserver >/dev/null 2>&1"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 2s

  # Packet-capture sidecar for coturn (design §B). coturn's image has no tcpdump, so a tiny sidecar SHARES
  # coturn's network namespace (network_mode: service:coturn) and ring-buffers the relay path to /cap. It
  # reuses the nat image (which ships tcpdump); collect_diagnostics docker-cp's /cap out on failure and the
  # stack teardown discards it on pass, so a green lane pays only an idle capture. NET_RAW for tcpdump; no
  # `networks:` of its own (it lives in coturn's netns). Started for every scenario (run-interop INFRA).
  coturn_pcap:
    build: { context: ., dockerfile: nat/Dockerfile }
    entrypoint: ["sh", "-c", "mkdir -p /cap && exec tcpdump -i any -w /cap/cap.pcap -C 20 -W 3 -U"]
    network_mode: "service:coturn"
    cap_add: [NET_RAW]
    depends_on:
      coturn: { condition: service_healthy }

  rendezvous:
    build: { context: ., dockerfile: rendezvous/Dockerfile }
    env_file: ./harness.env
    networks:
      pub: { ipv4_address: "${RENDEZVOUS_IP}" }
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f rendezvous.py >/dev/null 2>&1"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 1s

  nat_a:
    build: { context: ., dockerfile: nat/Dockerfile }
    cap_add: [NET_ADMIN, NET_RAW]   # NET_RAW: the ring-buffered tcpdump forensic capture (design §B)
    sysctls: { net.ipv4.ip_forward: 1 }
    environment:
      NAT_PROFILE: "${NAT_A_PROFILE:-port-restricted}"
      NAT_WAN_IP: "${NAT_A_WAN_IP}"
      NAT_LAN_IP: "${NAT_A_LAN_IP}"
      PEER_IP: "${PEER_A_IP}"
      ICE_PORT: "${ICE_PORT}"
      # Carrier-grade (NAT444 / hairpin) upstream. Empty in the single-NAT lanes → nat-setup skips the
      # behind-carrier block and nat_a reaches pub directly. run-interop.sh sets NAT_A_CARRIER_GW to a
      # carrier NAT's inside IP for the cgnat/hairpin lanes; NAT_A_CAR_IP is nat_a's own carrier address.
      NAT_CAR_IP: "${NAT_A_CAR_IP}"
      NAT_CARRIER_GW: "${NAT_A_CARRIER_GW:-}"
      CARRIER_ROUTES: "${CARRIER_ROUTES}"
    networks:
      pub: { ipv4_address: "${NAT_A_WAN_IP}" }
      lan_a: { ipv4_address: "${NAT_A_LAN_IP}" }
      car: { ipv4_address: "${NAT_A_CAR_IP}" }
    healthcheck:
      test: ["CMD-SHELL", "iptables -t nat -S | grep -q MASQUERADE"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 1s

  nat_b:
    build: { context: ., dockerfile: nat/Dockerfile }
    cap_add: [NET_ADMIN, NET_RAW]   # NET_RAW: the ring-buffered tcpdump forensic capture (design §B)
    sysctls: { net.ipv4.ip_forward: 1 }
    environment:
      NAT_PROFILE: "${NAT_B_PROFILE:-port-restricted}"
      NAT_WAN_IP: "${NAT_B_WAN_IP}"
      NAT_LAN_IP: "${NAT_B_LAN_IP}"
      PEER_IP: "${PEER_B_IP}"
      ICE_PORT: "${ICE_PORT}"
      NAT_CAR_IP: "${NAT_B_CAR_IP}"           # see nat_a — carrier-grade (NAT444 / hairpin) upstream
      NAT_CARRIER_GW: "${NAT_B_CARRIER_GW:-}"
      CARRIER_ROUTES: "${CARRIER_ROUTES}"
    networks:
      pub: { ipv4_address: "${NAT_B_WAN_IP}" }
      lan_b: { ipv4_address: "${NAT_B_LAN_IP}" }
      car: { ipv4_address: "${NAT_B_CAR_IP}" }
    healthcheck:
      test: ["CMD-SHELL", "iptables -t nat -S | grep -q MASQUERADE"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 1s

  # ── Carrier-grade NATs (NAT444 / hairpin) — the EXTRA hop the CPE NATs route through ────────────────
  # Each is the SAME nat image as nat_a/nat_b, but wired car→pub (its LAN face is the carrier shared space,
  # its WAN face the public net) and WITHOUT a NAT_CARRIER_GW — it IS the public-facing translation. It
  # needs no PEER_IP (that only feeds the full-cone DNAT, which the cone/symmetric carrier profiles don't
  # use), so a placeholder is passed. run-interop.sh points each CPE's NAT_*_CARRIER_GW at the right one.
  #
  # cgnat_a / cgnat_b (profile `cgnat`): per-side carrier NATs, distinct public IPs, port-restricted cone
  # → the composed CPE+carrier mapping stays consistent, so the double NAT is traversable via srflx.
  cgnat_a:
    profiles: ["cgnat"]
    build: { context: ., dockerfile: nat/Dockerfile }
    cap_add: [NET_ADMIN, NET_RAW]   # NET_RAW: the ring-buffered tcpdump forensic capture (design §B)
    sysctls: { net.ipv4.ip_forward: 1 }
    environment:
      NAT_PROFILE: "port-restricted"
      NAT_WAN_IP: "${CGNAT_A_WAN_IP}"
      NAT_LAN_IP: "${CGNAT_A_CAR_IP}"
      PEER_IP: "0.0.0.0"      # unused (no full-cone DNAT on a carrier NAT); placeholder for nat-setup.sh
      ICE_PORT: "${ICE_PORT}"
    networks:
      pub: { ipv4_address: "${CGNAT_A_WAN_IP}" }
      car: { ipv4_address: "${CGNAT_A_CAR_IP}" }
    healthcheck:
      test: ["CMD-SHELL", "iptables -t nat -S | grep -q MASQUERADE"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 1s

  cgnat_b:
    profiles: ["cgnat"]
    build: { context: ., dockerfile: nat/Dockerfile }
    cap_add: [NET_ADMIN, NET_RAW]   # NET_RAW: the ring-buffered tcpdump forensic capture (design §B)
    sysctls: { net.ipv4.ip_forward: 1 }
    environment:
      NAT_PROFILE: "port-restricted"
      NAT_WAN_IP: "${CGNAT_B_WAN_IP}"
      NAT_LAN_IP: "${CGNAT_B_CAR_IP}"
      PEER_IP: "0.0.0.0"      # unused; see cgnat_a
      ICE_PORT: "${ICE_PORT}"
    networks:
      pub: { ipv4_address: "${CGNAT_B_WAN_IP}" }
      car: { ipv4_address: "${CGNAT_B_CAR_IP}" }
    healthcheck:
      test: ["CMD-SHELL", "iptables -t nat -S | grep -q MASQUERADE"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 1s

  # cgnat (profile `hairpin`): ONE shared carrier NAT that BOTH CPEs route through, so both peers share a
  # single external identity (its public IP) — the hairpin topology. Symmetric mapping (`--random-fully`)
  # makes each peer's srflx useless to the other (as in the symmetric-relay lane), and stock netfilter does
  # not hairpin car→car, so ICE falls back to the coturn TURN relay — the establishment path we assert.
  cgnat:
    profiles: ["hairpin"]
    build: { context: ., dockerfile: nat/Dockerfile }
    cap_add: [NET_ADMIN, NET_RAW]   # NET_RAW: the ring-buffered tcpdump forensic capture (design §B)
    sysctls: { net.ipv4.ip_forward: 1 }
    environment:
      NAT_PROFILE: "symmetric"
      NAT_WAN_IP: "${CGNAT_SHARED_WAN_IP}"
      NAT_LAN_IP: "${CGNAT_SHARED_CAR_IP}"
      PEER_IP: "0.0.0.0"      # unused; see cgnat_a
      ICE_PORT: "${ICE_PORT}"
    networks:
      pub: { ipv4_address: "${CGNAT_SHARED_WAN_IP}" }
      car: { ipv4_address: "${CGNAT_SHARED_CAR_IP}" }
    healthcheck:
      test: ["CMD-SHELL", "iptables -t nat -S | grep -q MASQUERADE"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 1s

  peer_a:
    build:
      context: ..
      dockerfile: "test-harness/peer/${PEER_DOCKERFILE:-Dockerfile}"
      args: { PEER_KEXE: "${PEER_KEXE:-}" }
    cap_add: [NET_ADMIN]
    # socket-udp's Linux datapath is io_uring, whose syscalls (io_uring_setup/enter/register) Docker's
    # default seccomp profile denies (EPERM). `seccomp=unconfined` opens them — broader than ideal, but
    # the blast radius is small: the peer is NOT privileged and holds only NET_ADMIN, so the dangerous
    # unconfined syscalls (mount/init_module/bpf/…) still fail without their caps. `no-new-privileges`
    # blocks privilege escalation on top. (A tighter option is a custom profile = default + io_uring.)
    security_opt: ["seccomp=unconfined", "no-new-privileges:true"]
    environment:
      GATEWAY_IP: "${NAT_A_LAN_IP}"
      WEBRTC_ROLE: offerer
      WEBRTC_SESSION: "${SESSION:-l2}"
      WEBRTC_LOCAL_IP: "${PEER_A_IP}"
      WEBRTC_LOCAL_PORT: "${ICE_PORT}"
      WEBRTC_RELAY_PORT: "${RELAY_BIND_PORT}"
      WEBRTC_STUN_HOST: "${COTURN_IP}"
      WEBRTC_STUN_PORT: "${STUN_PORT}"
      WEBRTC_TURN_HOST: "${COTURN_IP}"
      WEBRTC_TURN_PORT: "${STUN_PORT}"
      WEBRTC_TURN_USER: "${TURN_USER}"
      WEBRTC_TURN_PASS: "${TURN_PASS}"
      WEBRTC_RENDEZVOUS_HOST: "${RENDEZVOUS_IP}"
      WEBRTC_RENDEZVOUS_PORT: "${RENDEZVOUS_PORT}"
      WEBRTC_ICE_POLICY: "${ICE_POLICY:-all}"
      WEBRTC_TIMEOUT_MS: "${PEER_TIMEOUT_MS}"
      # Default 1.3-on (production). The Pion interop lane sets PEER_DTLS13=false (run-interop.sh) so this
      # offerer pins DTLS 1.2 — Pion's released v3 is 1.2-only.
      WEBRTC_DTLS13: "${PEER_DTLS13:-true}"
    networks:
      lan_a: { ipv4_address: "${PEER_A_IP}" }
    depends_on:
      coturn: { condition: service_healthy }
      rendezvous: { condition: service_healthy }
      nat_a: { condition: service_healthy }

  peer_b:
    build:
      context: ..
      dockerfile: "test-harness/peer/${PEER_DOCKERFILE:-Dockerfile}"
      args: { PEER_KEXE: "${PEER_KEXE:-}" }
    cap_add: [NET_ADMIN]
    security_opt: ["seccomp=unconfined", "no-new-privileges:true"]  # io_uring (socket-udp) — see peer_a
    environment:
      GATEWAY_IP: "${NAT_B_LAN_IP}"
      WEBRTC_ROLE: answerer
      WEBRTC_SESSION: "${SESSION:-l2}"
      WEBRTC_LOCAL_IP: "${PEER_B_IP}"
      WEBRTC_LOCAL_PORT: "${ICE_PORT}"
      WEBRTC_RELAY_PORT: "${RELAY_BIND_PORT}"
      WEBRTC_STUN_HOST: "${COTURN_IP}"
      WEBRTC_STUN_PORT: "${STUN_PORT}"
      WEBRTC_TURN_HOST: "${COTURN_IP}"
      WEBRTC_TURN_PORT: "${STUN_PORT}"
      WEBRTC_TURN_USER: "${TURN_USER}"
      WEBRTC_TURN_PASS: "${TURN_PASS}"
      WEBRTC_RENDEZVOUS_HOST: "${RENDEZVOUS_IP}"
      WEBRTC_RENDEZVOUS_PORT: "${RENDEZVOUS_PORT}"
      WEBRTC_ICE_POLICY: "${ICE_POLICY:-all}"
      WEBRTC_TIMEOUT_MS: "${PEER_TIMEOUT_MS}"
      WEBRTC_DTLS13: "${PEER_DTLS13:-true}"  # see peer_a
    networks:
      lan_b: { ipv4_address: "${PEER_B_IP}" }
    depends_on:
      coturn: { condition: service_healthy }
      rendezvous: { condition: service_healthy }
      nat_b: { condition: service_healthy }

  # JVM offerer — W7 interop test-matrix expansion. A DROP-IN for the native offerer peer_a (same LAN, same
  # IP, same NAT gateway, same offerer WEBRTC_* env), so the "our side" endpoint is the SAME peer program
  # running on the JVM instead of Kotlin/Native — the pure-Kotlin engine (NativePeerConnection +
  # PureKotlinDtls) over socket-udp's NIO datapath. It establishes against ANY b-side (native peer_b, Pion,
  # Chrome, Firefox), proving the pure engine on the real wire from a managed runtime. Gated behind the
  # `jvm` compose profile (run-interop.sh activates it via COMPOSE_PROFILES when a_impl=jvm); peer_a and
  # peer_a_jvm share PEER_A_IP but never run together. No io_uring (NIO, not socket-udp's native datapath),
  # so — unlike peer_a — no seccomp=unconfined; only NET_ADMIN for the default-route rewrite. The jar is
  # arch-independent, so the SAME image runs on x64 and arm64.
  peer_a_jvm:
    profiles: ["jvm"]
    build:
      context: ..
      dockerfile: "test-harness/peer-jvm/${PEER_JVM_DOCKERFILE:-Dockerfile}"
      args: { PEER_JAR: "${PEER_JAR:-}" }
    cap_add: [NET_ADMIN]
    security_opt: ["no-new-privileges:true"]
    environment:
      GATEWAY_IP: "${NAT_A_LAN_IP}"
      WEBRTC_ROLE: offerer
      WEBRTC_SESSION: "${SESSION:-l2}"
      WEBRTC_LOCAL_IP: "${PEER_A_IP}"
      WEBRTC_LOCAL_PORT: "${ICE_PORT}"
      WEBRTC_RELAY_PORT: "${RELAY_BIND_PORT}"
      WEBRTC_STUN_HOST: "${COTURN_IP}"
      WEBRTC_STUN_PORT: "${STUN_PORT}"
      WEBRTC_TURN_HOST: "${COTURN_IP}"
      WEBRTC_TURN_PORT: "${STUN_PORT}"
      WEBRTC_TURN_USER: "${TURN_USER}"
      WEBRTC_TURN_PASS: "${TURN_PASS}"
      WEBRTC_RENDEZVOUS_HOST: "${RENDEZVOUS_IP}"
      WEBRTC_RENDEZVOUS_PORT: "${RENDEZVOUS_PORT}"
      WEBRTC_ICE_POLICY: "${ICE_POLICY:-all}"
      WEBRTC_TIMEOUT_MS: "${PEER_TIMEOUT_MS}"
      # Default 1.3-on (production). The jvm-pion lane sets PEER_DTLS13=false (run-interop.sh) so this
      # offerer pins DTLS 1.2 — Pion's released v3 is 1.2-only.
      WEBRTC_DTLS13: "${PEER_DTLS13:-true}"
    networks:
      lan_a: { ipv4_address: "${PEER_A_IP}" }
    depends_on:
      coturn: { condition: service_healthy }
      rendezvous: { condition: service_healthy }
      nat_a: { condition: service_healthy }

  # Pion (Go) interop echo-peer — W7 Phase 2(a). A DROP-IN for the native answerer peer_b (same LAN, same
  # IP, same NAT gateway, same WEBRTC_* env), so our native offerer peer_a establishes against a real
  # independent WebRTC implementation and echoes ping/pong. Gated behind the `pion` compose profile so it
  # only starts for the pion-interop scenario (run-interop.sh activates it via COMPOSE_PROFILES=pion); the
  # native peer_b and this share PEER_B_IP but never run at the same time. No io_uring here (pure Go), so
  # no seccomp=unconfined — only NET_ADMIN for the default-route rewrite.
  pion:
    profiles: ["pion"]
    build:
      context: ./pion
      dockerfile: Dockerfile
    cap_add: [NET_ADMIN]
    security_opt: ["no-new-privileges:true"]
    environment:
      GATEWAY_IP: "${NAT_B_LAN_IP}"
      WEBRTC_ROLE: answerer  # the Go peer is answerer-only; informational
      # pion/webrtc's default logger honors these — set PION_LOG_TRACE=all (or PION_LOG_DEBUG=dtls) to make
      # pion/dtls log the exact handshake flights + any alert, for interop debugging. Empty = pion default.
      PION_LOG_TRACE: "${PION_LOG_TRACE:-}"
      PION_LOG_DEBUG: "${PION_LOG_DEBUG:-}"
      WEBRTC_SESSION: "${SESSION:-l2}"
      WEBRTC_LOCAL_IP: "${PEER_B_IP}"
      WEBRTC_STUN_HOST: "${COTURN_IP}"
      WEBRTC_STUN_PORT: "${STUN_PORT}"
      WEBRTC_TURN_HOST: "${COTURN_IP}"
      WEBRTC_TURN_PORT: "${STUN_PORT}"
      WEBRTC_TURN_USER: "${TURN_USER}"
      WEBRTC_TURN_PASS: "${TURN_PASS}"
      WEBRTC_RENDEZVOUS_HOST: "${RENDEZVOUS_IP}"
      WEBRTC_RENDEZVOUS_PORT: "${RENDEZVOUS_PORT}"
      WEBRTC_ICE_POLICY: "${ICE_POLICY:-all}"
      WEBRTC_TIMEOUT_MS: "${PEER_TIMEOUT_MS}"
    networks:
      lan_b: { ipv4_address: "${PEER_B_IP}" }
    depends_on:
      coturn: { condition: service_healthy }
      rendezvous: { condition: service_healthy }
      nat_b: { condition: service_healthy }

  # Headless-browser (Playwright) interop echo-peers — W7 Phase 2(b). Like `pion`, each is a DROP-IN for
  # the native answerer peer_b (same LAN/IP/NAT gateway/WEBRTC_* env), so our native offerer peer_a
  # establishes against a real BROWSER WebRTC engine and echoes ping/pong. Two engines, one image
  # (test-harness/browser, selected by the BROWSER build-arg + env): `chrome` runs Chromium's libwebrtc,
  # `firefox` runs Firefox's fully-independent stack (NSS DTLS, nICEr ICE, usrsctp) — a distinct oracle.
  # Both negotiate DTLS 1.3, so these lanes leave PEER_DTLS13 at its true default (unlike the Pion 1.2
  # lane). Each is gated behind its own compose profile (run-interop.sh sets COMPOSE_PROFILES); peer_b,
  # pion, chrome, and firefox all share PEER_B_IP but never run together. A browser has no raw UDP, so it
  # signals over the rendezvous HTTP face (WEBRTC_RENDEZVOUS_HTTP_PORT) — the same mailbox the UDP peers
  # use. No io_uring (browser engine, not socket-udp), so no seccomp=unconfined; NET_ADMIN for the
  # default-route rewrite; shm_size (+ Chromium's --disable-dev-shm-usage) for Docker's small /dev/shm.
  chrome:
    profiles: ["chrome"]
    build:
      context: ./browser
      dockerfile: Dockerfile
      args: { BROWSER: chromium }
    cap_add: [NET_ADMIN]
    security_opt: ["no-new-privileges:true"]
    shm_size: "512m"
    environment:
      GATEWAY_IP: "${NAT_B_LAN_IP}"
      BROWSER: chromium
      WEBRTC_ROLE: answerer  # the browser peer is answerer-only; informational
      WEBRTC_SESSION: "${SESSION:-l2}"
      WEBRTC_LOCAL_IP: "${PEER_B_IP}"
      WEBRTC_STUN_HOST: "${COTURN_IP}"
      WEBRTC_STUN_PORT: "${STUN_PORT}"
      WEBRTC_TURN_HOST: "${COTURN_IP}"
      WEBRTC_TURN_PORT: "${STUN_PORT}"
      WEBRTC_TURN_USER: "${TURN_USER}"
      WEBRTC_TURN_PASS: "${TURN_PASS}"
      WEBRTC_RENDEZVOUS_HOST: "${RENDEZVOUS_IP}"
      WEBRTC_RENDEZVOUS_HTTP_PORT: "${RENDEZVOUS_HTTP_PORT}"
      WEBRTC_ICE_POLICY: "${ICE_POLICY:-all}"
      WEBRTC_TIMEOUT_MS: "${PEER_TIMEOUT_MS}"
    networks:
      lan_b: { ipv4_address: "${PEER_B_IP}" }
    depends_on:
      coturn: { condition: service_healthy }
      rendezvous: { condition: service_healthy }
      nat_b: { condition: service_healthy }

  firefox:
    profiles: ["firefox"]
    build:
      context: ./browser
      dockerfile: Dockerfile
      args: { BROWSER: firefox }
    cap_add: [NET_ADMIN]
    security_opt: ["no-new-privileges:true"]
    shm_size: "512m"
    environment:
      GATEWAY_IP: "${NAT_B_LAN_IP}"
      BROWSER: firefox
      WEBRTC_ROLE: answerer  # the browser peer is answerer-only; informational
      WEBRTC_SESSION: "${SESSION:-l2}"
      WEBRTC_LOCAL_IP: "${PEER_B_IP}"
      WEBRTC_STUN_HOST: "${COTURN_IP}"
      WEBRTC_STUN_PORT: "${STUN_PORT}"
      WEBRTC_TURN_HOST: "${COTURN_IP}"
      WEBRTC_TURN_PORT: "${STUN_PORT}"
      WEBRTC_TURN_USER: "${TURN_USER}"
      WEBRTC_TURN_PASS: "${TURN_PASS}"
      WEBRTC_RENDEZVOUS_HOST: "${RENDEZVOUS_IP}"
      WEBRTC_RENDEZVOUS_HTTP_PORT: "${RENDEZVOUS_HTTP_PORT}"
      WEBRTC_ICE_POLICY: "${ICE_POLICY:-all}"
      WEBRTC_TIMEOUT_MS: "${PEER_TIMEOUT_MS}"
    networks:
      lan_b: { ipv4_address: "${PEER_B_IP}" }
    depends_on:
      coturn: { condition: service_healthy }
      rendezvous: { condition: service_healthy }
      nat_b: { condition: service_healthy }

  # WebKit (Safari's engine, via Playwright's cross-platform build) — a THIRD independent browser oracle
  # (Apple's libwebrtc fork + its own build). Same drop-in-for-peer_b shape as chrome/firefox, `webkit`
  # profile. Unlike them it emits `.local` mDNS host candidates (no disable pref), so it connects via the
  # coturn srflx/relay path — our ICE agent skips the unresolvable hosts. DTLS 1.3 (peer stays at default).
  webkit:
    profiles: ["webkit"]
    build:
      context: ./browser
      dockerfile: Dockerfile
      args: { BROWSER: webkit }
    cap_add: [NET_ADMIN]
    security_opt: ["no-new-privileges:true"]
    shm_size: "512m"
    environment:
      GATEWAY_IP: "${NAT_B_LAN_IP}"
      BROWSER: webkit
      WEBRTC_ROLE: answerer  # the browser peer is answerer-only; informational
      WEBRTC_SESSION: "${SESSION:-l2}"
      WEBRTC_LOCAL_IP: "${PEER_B_IP}"
      WEBRTC_STUN_HOST: "${COTURN_IP}"
      WEBRTC_STUN_PORT: "${STUN_PORT}"
      WEBRTC_TURN_HOST: "${COTURN_IP}"
      WEBRTC_TURN_PORT: "${STUN_PORT}"
      WEBRTC_TURN_USER: "${TURN_USER}"
      WEBRTC_TURN_PASS: "${TURN_PASS}"
      WEBRTC_RENDEZVOUS_HOST: "${RENDEZVOUS_IP}"
      WEBRTC_RENDEZVOUS_HTTP_PORT: "${RENDEZVOUS_HTTP_PORT}"
      WEBRTC_ICE_POLICY: "${ICE_POLICY:-all}"
      WEBRTC_TIMEOUT_MS: "${PEER_TIMEOUT_MS}"
    networks:
      lan_b: { ipv4_address: "${PEER_B_IP}" }
    depends_on:
      coturn: { condition: service_healthy }
      rendezvous: { condition: service_healthy }
      nat_b: { condition: service_healthy }

  # netem impairment (loss/delay/jitter/reorder) is applied to each NAT's PUBLIC (WAN) interface — the
  # data path between the peers — on demand by run-interop.sh (`nat/netem.sh` via `docker exec` on
  # nat_a/nat_b), so it composes with any NAT profile without a separate service. See the `impaired` scenario.
