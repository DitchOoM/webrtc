# Canonical PR labels, synced to the repo by .github/workflows/labels.yaml.
# The release pipeline (merged.yaml) reads the version-bump + flow labels; keep them in sync here.

# ── Version bump (merged.yaml → -PincrementMajor / -PincrementMinor; patch is the default) ──
- name: major
  color: "b60205"
  description: "Breaking change — bump the major version on release"
- name: minor
  color: "0e8a16"
  description: "New module or additive feature — bump the minor version on release"
- name: patch
  color: "c2e0c6"
  description: "Bug fix / internal change — default patch bump (informational)"

# ── Release flow overrides ──
- name: skip-release
  color: "fbca04"
  description: "Merge without publishing (dry-run flow)"
- name: draft-release
  color: "fef2c0"
  description: "Publish to Central staging as a draft, awaiting manual completion"

# ── Wave tracking (EXECUTION_PLAN.md W0–W7) ──
- name: "wave:W0"
  color: "5319e7"
  description: "Foundations — repo skeleton, upstream promotions"
