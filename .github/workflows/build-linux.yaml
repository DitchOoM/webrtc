name: "Build & Test (Linux)"

# Reusable lane: JVM / JS / WASM / Android / Linux-K/N build + test, then publish every module to a
# local Maven repo uploaded as the `maven-local-linux` artifact. Outputs the computed version so the
# caller can thread it into validate / publish.
#
# W0 skeleton: no native toolchain steps yet. When webrtc-dtls lands its BoringSSL backends (W4), add
# the vendored-BoringSSL build steps here (reuse the socket-quic-quiche/quiche build infra, per RFC §8).

on:
  workflow_call:
    inputs:
      gradle-args:
        description: "Extra Gradle arguments (e.g., -PincrementMinor=true)"
        required: false
        default: ""
        type: string
    outputs:
      version:
        description: "Computed next version"
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    name: "Linux / JVM / JS / WASM / Android"
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle

      - name: Setup Chrome (jsBrowserTest / wasmJsBrowserTest)
        uses: browser-actions/setup-chrome@v2

      - name: Compute version
        id: version
        run: |
          version=$(./gradlew -q :webrtc:properties ${{ inputs.gradle-args }} --no-configuration-cache \
            | awk -F': ' '/^version:/{print $2}')
          if [ -z "$version" ]; then echo "::error::could not compute version"; exit 1; fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${version}"

      - name: Build + test (Linux/JVM/JS/WASM/Android)
        run: ./gradlew build allTests ${{ inputs.gradle-args }} --no-configuration-cache

      - name: Binary-compatibility check (public ABI)
        run: ./gradlew apiCheck ${{ inputs.gradle-args }} --no-configuration-cache

      - name: Publish to local Maven repo
        # -PskipPrePublishCheck: tests already ran in "Build + test" above; don't re-run the gate.
        run: ./gradlew publishToMavenLocal -PskipPrePublishCheck=true ${{ inputs.gradle-args }} --no-configuration-cache

      - name: Stage published artifacts
        run: |
          mkdir -p /tmp/maven-local-linux/com/ditchoom
          cp -r ~/.m2/repository/com/ditchoom/. /tmp/maven-local-linux/com/ditchoom/

      - name: Upload maven-local (linux)
        uses: actions/upload-artifact@v4
        with:
          name: maven-local-linux
          path: /tmp/maven-local-linux
          retention-days: 3
