# coturn config for the L2 harness — a real STUN + TURN server so the peers gather genuine
# server-reflexive (srflx) and relay candidates against a real implementation (not the vnet's model).
#
# Short-term / static credentials (matches webrtc-ice's TurnAllocation: MD5-free short-term MI).
# Values are substituted at container start from harness.env by the coturn entrypoint.

# Listen for STUN + TURN on the UDP port (harness.env STUN_PORT). TCP/TLS not needed — WebRTC ICE is UDP.
listening-port=__STUN_PORT__
fingerprint

# Static long-term-style user (coturn calls this lt-cred, but with a single fixed user it serves as the
# short-term credential the peer sends via MESSAGE-INTEGRITY).
lt-cred-mech
user=__TURN_USER__:__TURN_PASS__
realm=__TURN_REALM__

# Relay allocation port range — keep small + pinned so docker-compose can expose/allow exactly it.
min-port=__TURN_MIN_PORT__
max-port=__TURN_MAX_PORT__

# The listening/relay/external addresses coturn hands out (= its public-net IPs, per family) are APPENDED
# by the entrypoint, gated on family: always the v4 address; the v6 address too when COTURN_IP6_ENABLED=1
# (compose.ipv6.yml), and the v4 address is dropped when COTURN_IP4_DISABLED=1 (compose.v6only.yml). This
# keeps the v4 lane binding only v4 (an unassigned listening-ip makes coturn abort) and serves both families
# from ONE coturn on the dual/v6 lanes.

# Harness hygiene: no TLS cert needed, quiet-ish logs, no multi-tenant, allow loopback for healthcheck.
no-tls
no-dtls
no-cli
simple-log
